<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台北吃到飽｜15家精選餐廳</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f5f5f5; color: #333; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #ff6b35, #f7c948); border-radius: 20px; margin-bottom: 30px; }
.header h1 { font-size: 2.2em; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.header p { color: rgba(255,255,255,0.9); margin-top: 10px; font-size: 1.1em; }

/* Controls */
.controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
.search-box { flex: 1; min-width: 250px; }
.search-box input { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1em; transition: border-color 0.3s; }
.search-box input:focus { outline: none; border-color: #ff6b35; }
.filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
select { padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; background: #fff; cursor: pointer; }

/* Ranking Toggle */
.ranking-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.ranking-toggle label { font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.toggle-switch { position: relative; width: 50px; height: 26px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 26px; transition: 0.3s; }
.toggle-slider:before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
input:checked + .toggle-slider { background: #ff6b35; }
input:checked + .toggle-slider:before { transform: translateX(24px); }

/* Stats Bar */
.stats-bar { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
.stat-item { background: #fff; padding: 15px 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex: 1; min-width: 150px; text-align: center; }
.stat-item .number { font-size: 1.8em; font-weight: 700; color: #ff6b35; }
.stat-item .label { color: #888; font-size: 0.9em; margin-top: 5px; }

/* Cards Grid */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.3s, box-shadow 0.3s; position: relative; }
.card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
.card.rank-card { border: 3px solid #f7c948; }
.card-rank { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, #f7c948, #ff6b35); color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.9em; z-index: 2; }
.card-img { height: 180px; background: linear-gradient(135deg, #ff6b35 0%, #f7c948 100%); display: flex; align-items: center; justify-content: center; font-size: 3em; color: #fff; }
.card-body { padding: 20px; }
.card-title { font-size: 1.3em; font-weight: 700; margin-bottom: 8px; color: #222; }
.card-type { display: inline-block; background: #fff3e0; color: #ff6b35; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
.card-price { font-size: 1.4em; font-weight: 700; color: #ff6b35; margin: 12px 0; }
.card-price span { font-size: 0.7em; color: #999; font-weight: 400; }
.card-info { display: flex; gap: 15px; color: #666; font-size: 0.9em; margin: 10px 0; flex-wrap: wrap; }
.card-info span { display: flex; align-items: center; gap: 5px; }
.card-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.tag { background: #f0f0f0; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; color: #555; }

/* Radar Chart Container */
.radar-section { margin-top: 40px; }
.radar-section h2 { text-align: center; margin-bottom: 25px; font-size: 1.6em; color: #333; }
.radar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
.radar-card { background: #fff; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
.radar-card h3 { font-size: 1.1em; margin-bottom: 15px; color: #333; }
.radar-chart { width: 220px; height: 220px; margin: 0 auto; }
.radar-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
.legend-item { font-size: 0.8em; color: #666; display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Footer */
.footer { text-align: center; padding: 40px 20px; color: #888; margin-top: 50px; }
.no-results { text-align: center; padding: 60px; color: #999; font-size: 1.2em; grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🍽️ 台北吃到飽精選</h1>
    <p>15家超人氣buffet · 持續更新</p>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜尋餐廳名稱、類型...">
    </div>
    <div class="filter-group">
      <select id="typeFilter">
        <option value="">所有類型</option>
        <option value="吃到飽">Buffet 吃到飽</option>
        <option value="鍋物">火鍋 / 鍋物</option>
        <option value="燒烤">燒烤</option>
        <option value="日式">日式料理</option>
      </select>
      <select id="priceFilter">
        <option value="">所有價位</option>
        <option value="low">$600 以下</option>
        <option value="mid">$600 - $1000</option>
        <option value="high">$1000 - $1500</option>
        <option value="luxury">$1500 以上</option>
      </select>
    </div>
  </div>

  <div class="ranking-toggle">
    <label class="toggle-switch">
      <input type="checkbox" id="rankToggle">
      <span class="toggle-slider"></span>
    </label>
    <span>只顯示 Top 10 排行榜</span>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="number" id="totalCount">15</div><div class="label">精選餐廳</div></div>
    <div class="stat-item"><div class="number" id="avgPrice">$950</div><div class="label">平均價位</div></div>
    <div class="stat-item"><div class="number" id="typeCount">4</div><div class="label">餐廳類型</div></div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>

  <div class="radar-section">
    <h2>📊 評分雷達圖</h2>
    <div class="radar-grid" id="radarGrid"></div>
  </div>

  <div class="footer">資料來源：網路評價彙整 · 僅供參考</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const restaurants = [
  { id: 1, name: "饗饗 微風信義", type: "吃到飽", price: 1890, lunch: 1490, rating: 4.8, reviews: 12500, food: 4.9, env: 4.8, service: 4.7, cp: 4.6, location: "信義區", hours: "11:30-14:00 / 17:30-21:00" },
  { id: 2, name: "旭集 和食集錦", type: "日式", price: 1650, lunch: 1290, rating: 4.7, reviews: 9800, food: 4.9, env: 4.6, service: 4.5, cp: 4.4, location: "信義區", hours: "11:30-14:00 / 17:30-21:00" },
  { id: 3, name: "饗食天堂 新店家樂福", type: "吃到飽", price: 749, lunch: 649, rating: 4.3, reviews: 15200, food: 4.2, env: 4.3, service: 4.2, cp: 4.6, location: "新店區", hours: "11:00-14:00 / 17:00-21:30" },
  { id: 4, name: "十二廚 台北喜來登", type: "吃到飽", price: 1280, lunch: 980, rating: 4.4, reviews: 8700, food: 4.3, env: 4.5, service: 4.4, cp: 4.3, location: "中正區", hours: "06:30-10:00 / 11:30-14:00 / 18:00-21:30" },
  { id: 5, name: "探索廚房 台北老爺", type: "吃到飽", price: 1180, lunch: 880, rating: 4.3, reviews: 6500, food: 4.3, env: 4.4, service: 4.3, cp: 4.2, location: "中山區", hours: "06:30-10:00 / 11:30-14:00 / 18:00-21:30" },
  { id: 6, name: "漢來海港 敦化店", type: "吃到飽", price: 799, lunch: 699, rating: 4.2, reviews: 18500, food: 4.1, env: 4.2, service: 4.0, cp: 4.5, location: "松山區", hours: "11:30-14:00 / 17:30-21:00" },
  { id: 7, name: "豐 FOOD 遠東國際", type: "吃到飽", price: 1100, lunch: 850, rating: 4.3, reviews: 5800, food: 4.2, env: 4.4, service: 4.2, cp: 4.3, location: "松山區", hours: "06:00-10:00 / 11:30-14:00 / 18:00-21:00" },
  { id: 8, name: "凱菲屋 台北君悅", type: "吃到飽", price: 1380, lunch: 1080, rating: 4.5, reviews: 9200, food: 4.5, env: 4.5, service: 4.4, cp: 4.3, location: "信義區", hours: "06:00-10:00 / 11:30-14:00 / 18:00-21:30" },
  { id: 9, name: "彩鳧 台北美福", type: "吃到飽", price: 2200, lunch: 1680, rating: 4.8, reviews: 4200, food: 4.9, env: 4.8, service: 4.8, cp: 4.5, location: "中山區", hours: "06:30-10:00 / 11:30-14:00 / 18:00-21:30" },
  { id: 10, name: "NAGOMI 和食 Buffet", type: "日式", price: 1390, lunch: 1090, rating: 4.5, reviews: 7300, food: 4.6, env: 4.4, service: 4.4, cp: 4.4, location: "信義區", hours: "11:30-14:00 / 17:30-21:00" },
  { id: 11, name: "涮乃葉 吃到飽火鍋", type: "鍋物", price: 568, lunch: 528, rating: 4.0, reviews: 21000, food: 3.9, env: 4.1, service: 4.0, cp: 4.4, location: "多店", hours: "11:00-22:00" },
  { id: 12, name: "燒肉同話 新光三越", type: "燒烤", price: 799, lunch: 699, rating: 4.1, reviews: 5400, food: 4.2, env: 4.2, service: 4.0, cp: 4.0, location: "台北各店", hours: "11:00-22:00" },
  { id: 13, name: "壽翁無老鍋", type: "鍋物", price: 680, lunch: 580, rating: 4.2, reviews: 7800, food: 4.3, env: 4.2, service: 4.2, cp: 4.1, location: "大安區", hours: "12:00-23:00" },
  { id: 14, name: "欣葉日本料理 館前店", type: "日式", price: 730, lunch: 630, rating: 4.1, reviews: 11200, food: 4.2, env: 4.0, service: 4.0, cp: 4.2, location: "中正區", hours: "11:30-14:30 / 17:30-21:30" },
  { id: 15, name: "馬辣頂級麻辣鍋", type: "鍋物", price: 699, lunch: 599, rating: 4.3, reviews: 16800, food: 4.4, env: 4.2, service: 4.1, cp: 4.3, location: "台北各店", hours: "11:30-14:00 / 17:30-22:00" }
];

const typeIcons = { "吃到飽": "🍽️", "鍋物": "🍲", "燒烤": "🥩", "日式": "🍣" };
const radarCharts = {};

function getPriceRange(price) {
  if (price < 600) return "low";
  if (price < 1000) return "mid";
  if (price < 1500) return "high";
  return "luxury";
}

function renderCards(data) {
  const grid = document.getElementById('cardsGrid');
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">沒有符合條件的餐廳</div>';
    return;
  }
  grid.innerHTML = data.map((r, i) => `
    <div class="card${i < 10 && document.getElementById('rankToggle').checked ? ' rank-card' : ''}">
      ${i < 10 && document.getElementById('rankToggle').checked ? `<div class="card-rank">🥇 第${i+1}名</div>` : ''}
      <div class="card-img">${typeIcons[r.type] || "🍽️"}</div>
      <div class="card-body">
        <div class="card-title">${r.name}</div>
        <span class="card-type">${r.type}</span>
        <div class="card-price">$${r.price} <span>/ 人</span></div>
        <div class="card-info">
          <span>⭐ ${r.rating}</span>
          <span>📝 ${(r.reviews/1000).toFixed(1)}k則</span>
          <span>📍 ${r.location}</span>
        </div>
        <div class="card-tags">
          <span class="tag">食物 ${r.food}</span>
          <span class="tag">環境 ${r.env}</span>
          <span class="tag">服務 ${r.service}</span>
          <span class="tag">CP ${r.cp}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterData() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const price = document.getElementById('priceFilter').value;
  const showTop10 = document.getElementById('rankToggle').checked;

  let filtered = restaurants.filter(r => {
    const matchSearch = r.name.toLowerCase().includes(search) || r.type.includes(search) || r.location.includes(search);
    const matchType = !type || r.type === type;
    const matchPrice = !price || getPriceRange(r.price) === price;
    return matchSearch && matchType && matchPrice;
  });

  if (showTop10) filtered = filtered.slice(0, 10);

  document.getElementById('totalCount').textContent = filtered.length;
  const avgPrice = filtered.length ? Math.round(filtered.reduce((s, r) => s + r.price, 0) / filtered.length) : 0;
  document.getElementById('avgPrice').textContent = '$' + avgPrice;
  renderCards(filtered);
}

function createRadarChart(canvasId, data, label) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  radarCharts[canvasId] = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['食物', '環境', '服務', 'CP值', '整體'],
      datasets: [{
        label: label,
        data: [data.food, data.env, data.service, data.cp, data.rating],
        backgroundColor: 'rgba(255, 107, 53, 0.2)',
        borderColor: '#ff6b35',
        borderWidth: 2,
        pointBackgroundColor: '#ff6b35',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: { r: { min: 0, max: 5, ticks: { stepSize: 1 } } },
      plugins: { legend: { display: false } }
    }
  });
}

function renderRadarCharts() {
  const grid = document.getElementById('radarGrid');
  const top5 = [...restaurants].sort((a, b) => b.rating - a.rating).slice(0, 5);
  grid.innerHTML = top5.map((r, i) => `
    <div class="radar-card">
      <h3>${i+1}. ${r.name}</h3>
      <canvas id="radar${r.id}" class="radar-chart"></canvas>
      <div class="radar-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#ff6b35"></span> 總分 ${r.rating}</span>
      </div>
    </div>
  `).join('');
  top5.forEach(r => createRadarChart(`radar${r.id}`, r, r.name));
}

document.getElementById('searchInput').addEventListener('input', filterData);
document.getElementById('typeFilter').addEventListener('change', filterData);
document.getElementById('priceFilter').addEventListener('change', filterData);
document.getElementById('rankToggle').addEventListener('change', filterData);

filterData();
renderRadarCharts();
</script>
</body>
</html>
